services:
  skill-hub:
    image: ghcr.io/${GITHUB_REPOSITORY:-sudoprivacy/skill-hub}:latest
    container_name: skill-hub
    restart: unless-stopped
    ports:
      - "${SKILL_HUB_PORT:-8080}:8080"
    environment:
      - SKILL_HUB_HOST=0.0.0.0
      - SKILL_HUB_PORT=8080
      - SKILL_HUB_DEBUG=false
      - SKILL_HUB_DATABASE_URL=${SKILL_HUB_DATABASE_URL}
      - SKILL_HUB_AUTH_TOKEN=${SKILL_HUB_AUTH_TOKEN}
      - SKILL_HUB_DATA_DIR=${SKILL_HUB_DATA_DIR:-/app/data}
      - SKILL_HUB_LOG_LEVEL=${SKILL_HUB_LOG_LEVEL:-INFO}
      - SKILL_HUB_API_PREFIX=${SKILL_HUB_API_PREFIX:-/api}
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
      - COS_REGION=${COS_REGION:-ap-beijing}
      - SKILL_HUB_COS_BASE_URL=${SKILL_HUB_COS_BASE_URL}
    volumes:
      - skill-hub-data:/app/data

volumes:
  skill-hub-data:
